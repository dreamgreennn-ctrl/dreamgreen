<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plant Gift Collections — Dream Green | Surat, Gujarat</title>
  <meta name="description" content="Explore our curated plant gift collections. From birthdays to housewarmings, find the perfect green gift for every occasion in Surat.">
  <link rel="canonical" href="https://dreamgreen.shop/shop" id="dgCanonical">
  <script>
    (function () {
      var pathMatch = window.location.pathname.match(/^\/collection\/([^\/\?#]+)/);
      var pathSlug = pathMatch ? decodeURIComponent(pathMatch[1]) : null;
      var querySlug = new URLSearchParams(window.location.search).get('id');
      var slug = pathSlug || querySlug;
      var canon = document.getElementById('dgCanonical');
      if (slug) {
        window.__dgCollectionSlug = slug;
        if (canon) canon.setAttribute('href', 'https://dreamgreen.shop/collection?id=' + encodeURIComponent(slug));
      } else {
        var m = document.createElement('meta');
        m.name = 'robots';
        m.content = 'noindex, follow';
        document.head.appendChild(m);
      }
    })();
  </script>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dreamgreen.shop/shop">
  <meta property="og:title" content="Plant Gift Collections — Dream Green | Surat, Gujarat">
  <meta property="og:description" content="Explore our curated plant gift collections for every special occasion.">
  <meta property="og:image" content="https://dreamgreen.shop/assets/images/og-collections.png">
  <meta property="og:site_name" content="Dream Green">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://dreamgreen.shop/shop">
  <meta name="twitter:title" content="Plant Gift Collections — Dream Green | Surat, Gujarat">
  <meta name="twitter:description" content="Explore our curated plant gift collections for every special occasion.">
  <meta name="twitter:image" content="https://dreamgreen.shop/assets/images/og-collections.png">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260329e">
</head>
<body>
  <div id="nav-slot"></div>

  <section class="page-header" id="collectionHeader">
    <div class="container">
      <div class="page-header__breadcrumb">
        <a href="/">Home</a> <span>/</span> <a href="/shop">Shop</a> <span>/</span> <span id="breadcrumbName">Collection</span>
      </div>
      <h1 class="page-header__title reveal" id="collectionTitle">Collection</h1>
      <p class="page-header__subtitle reveal" id="collectionDesc"></p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="shop__grid" id="collectionGrid"></div>
      <div class="text-center" style="margin-top:3rem;">
        <a href="/shop" class="btn btn--outline">← Browse All Plants</a>
      </div>
    </div>
  </section>

  <div id="footer-slot"></div>

  <!-- Firebase SDKs (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <!-- Scripts -->
  <script src="js/firebase-config.js?v=20260328"></script>
  <script src="js/data.js?v=20260328"></script>
  <script src="js/cart.js?v=20260328"></script>
  <script src="js/config.js?v=20260328"></script>
  <script src="js/components.js?v=20260328"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Initialize Data from Firebase first
      DreamGreenData.init(function() {
        DreamGreenComponents.initPage({
          onReady: function () {
            var collectionIdSource = window.__dgCollectionSlug ||
              new URLSearchParams(window.location.search).get('id');
            if (!collectionIdSource) {
              try { collectionIdSource = sessionStorage.getItem('last_viewed_collection_id'); } catch(e) {}
            }
            var collection = DreamGreenData.getCollection(collectionIdSource);

            if (!collection) {
              var allIds = DreamGreenData.collections.map(function(c) { return (c.id || 'N/A') + ' (slug) | FB ID: ' + (c.firebaseId || 'N/A'); }).join('<br>');
              console.error('Collection not found for ID:', collectionIdSource);
              document.getElementById('collectionTitle').textContent = 'Collection Not Found';
              document.getElementById('collectionGrid').innerHTML = 
                '<div class="shop__empty"><h2>Collection Not Found</h2>' + 
                '<p>The link was looking for: <strong>' + (collectionIdSource || 'None') + '</strong></p>' +
                '<p style="margin-top:1rem;"><strong>Available IDs in Database:</strong><br>' + (allIds || 'Nothing found in collections array') + '</p>' +
                '<p style="margin-top:1rem;"><a href="/shop" class="btn btn--primary">Browse All Plants</a></p></div>';
              return;
            }

            document.title = collection.name + ' — Dream Green | Surat, Gujarat';
            document.getElementById('breadcrumbName').textContent = collection.name;
            document.getElementById('collectionTitle').innerHTML = collection.emoji + ' ' + collection.name;
            document.getElementById('collectionDesc').textContent = collection.longDescription;

            var products = DreamGreenData.getProductsByOccasion(collection.id);
            document.getElementById('collectionGrid').innerHTML = products.length > 0
              ? products.map(function (p) { return DreamGreenComponents.renderProductCard(p); }).join('')
              : '<div class="shop__empty"><h3>No products found in this collection.</h3>' +
                '<p>ID: ' + collection.id + ' | Firebase ID: ' + (collection.firebaseId || 'None') + '</p>' +
                '<p><a href="/shop" class="btn btn--outline">Browse All Plants →</a></p></div>';
          }
        });
      });
    });
  </script>
</body>
</html>
