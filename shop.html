<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop All Plant Gifts — Dream Green | Surat, Gujarat</title>
  <meta name="description" content="Browse our curated collection of plant gifts. Hand-picked, beautifully packaged, and delivered across Surat. Perfect for any occasion.">
  <link rel="canonical" href="https://dreamgreen.shop/shop.html">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dreamgreen.shop/shop.html">
  <meta property="og:title" content="Shop All Plant Gifts — Dream Green | Surat, Gujarat">
  <meta property="og:description" content="Browse our curated collection of plant gifts. Hand-picked, beautifully packaged, and delivered across Surat.">
  <meta property="og:image" content="https://dreamgreen.shop/assets/images/og-shop.png">
  <meta property="og:site_name" content="Dream Green">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://dreamgreen.shop/shop.html">
  <meta name="twitter:title" content="Shop All Plant Gifts — Dream Green | Surat, Gujarat">
  <meta name="twitter:description" content="Browse our curated collection of plant gifts. Hand-picked, beautifully packaged, and delivered across Surat.">
  <meta name="twitter:image" content="https://dreamgreen.shop/assets/images/og-shop.png">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260328">
</head>
<body>
  <div id="nav-slot"></div>

  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <div class="page-header__breadcrumb">
        <a href="index.html">Home</a> <span>/</span> <span>Shop</span>
      </div>
      <h1 class="page-header__title reveal">Shop All Plant Gifts</h1>
      <p class="page-header__subtitle reveal">Find the perfect green gift for every occasion. Same-day delivery across Surat.</p>
    </div>
  </section>

  <!-- Filters & Products -->
  <section class="shop section">
    <div class="container">
      <div class="shop__layout">
        <!-- Sidebar Filters -->
        <aside class="shop__sidebar reveal-left">
          <div class="filter-group">
            <h3 class="filter-group__title">Category</h3>
            <div class="filter-group__options">
              <label class="filter-option"><input type="radio" name="category" value="all" checked><span>All Plants</span></label>
              <label class="filter-option"><input type="radio" name="category" value="indoor"><span>Indoor Plants</span></label>
              <label class="filter-option"><input type="radio" name="category" value="succulent"><span>Succulents</span></label>
              <label class="filter-option"><input type="radio" name="category" value="flowering"><span>Flowering Plants</span></label>
            </div>
          </div>
          <div class="filter-group">
            <h3 class="filter-group__title">Occasion</h3>
            <div class="filter-group__options">
              <label class="filter-option"><input type="radio" name="occasion" value="all" checked><span>All Occasions</span></label>
              <label class="filter-option"><input type="radio" name="occasion" value="birthday"><span>🎂 Birthday</span></label>
              <label class="filter-option"><input type="radio" name="occasion" value="housewarming"><span>🏠 Housewarming</span></label>
              <label class="filter-option"><input type="radio" name="occasion" value="anniversary"><span>💍 Anniversary</span></label>
              <label class="filter-option"><input type="radio" name="occasion" value="self-care"><span>🧘 Self-Care</span></label>
              <label class="filter-option"><input type="radio" name="occasion" value="corporate"><span>💼 Corporate</span></label>
              <label class="filter-option"><input type="radio" name="occasion" value="festive"><span>🎄 Festive</span></label>
            </div>
          </div>
          <div class="filter-group">
            <h3 class="filter-group__title">Sort By</h3>
            <select class="filter-select" id="sortSelect">
              <option value="popular">Most Popular</option>
              <option value="price-low">Price: Low to High</option>
              <option value="price-high">Price: High to Low</option>
              <option value="rating">Top Rated</option>
            </select>
          </div>
        </aside>

        <!-- Products Grid -->
        <div class="shop__main">
          <div class="shop__results-bar">
            <span id="resultsCount">10 products</span>
            <button class="shop__filter-toggle" id="filterToggle">☰ Filters</button>
          </div>
          <div class="shop__grid" id="shopGrid"></div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-slot"></div>

  <!-- Firebase SDKs (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <!-- Scripts -->
  <script src="js/firebase-config.js?v=20260328"></script>
  <script src="js/data.js?v=20260328"></script>
  <script src="js/cart.js?v=20260328"></script>
  <script src="js/config.js?v=20260328"></script>
  <script src="js/components.js?v=20260328"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Initialize Data from Firebase first
      DreamGreenData.init(function() {
        DreamGreenComponents.initPage({
          onReady: function () {
            var grid = document.getElementById('shopGrid');
            var resultsCount = document.getElementById('resultsCount');
            var sortSelect = document.getElementById('sortSelect');

            // Read URL params for pre-filtering
            var params = new URLSearchParams(window.location.search);
            if (params.get('occasion')) {
              var radio = document.querySelector('input[name="occasion"][value="' + params.get('occasion') + '"]');
              if (radio) radio.checked = true;
            }
            if (params.get('category')) {
              var radio = document.querySelector('input[name="category"][value="' + params.get('category') + '"]');
              if (radio) radio.checked = true;
            }
            if (params.get('sort')) {
              sortSelect.value = params.get('sort');
            }

            function renderProducts() {
              var category = document.querySelector('input[name="category"]:checked').value;
              var occasion = document.querySelector('input[name="occasion"]:checked').value;
              var sort = sortSelect.value;

              var filters = { sort: sort };
              if (category !== 'all') filters.category = category;
              if (occasion !== 'all') filters.occasion = occasion;

              var products = DreamGreenData.filterProducts(filters);
              resultsCount.textContent = products.length + ' product' + (products.length !== 1 ? 's' : '');

              grid.innerHTML = products.length > 0 ? products.map(function (p) {
                return DreamGreenComponents.renderProductCard(p);
              }).join('') : '<div class="shop__empty"><p>No plants match your filters. Try adjusting your selection.</p></div>';
            }

            // Listen to filter changes
            document.querySelectorAll('input[name="category"], input[name="occasion"]').forEach(function (el) {
              el.addEventListener('change', renderProducts);
            });
            sortSelect.addEventListener('change', renderProducts);

            // Mobile filter toggle
            var sidebar = document.querySelector('.shop__sidebar');
            document.getElementById('filterToggle').addEventListener('click', function () {
              sidebar.classList.toggle('open');
            });

            renderProducts();
          }
        });
      });
    });
  </script>
</body>
</html>
