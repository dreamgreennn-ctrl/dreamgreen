<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Gift Cart — Dream Green | Surat, Gujarat</title>
  <meta name="description" content="Review your curated plant gifts and proceed to secure checkout. Same-day delivery available across Surat, Gujarat.">
  <link rel="canonical" href="https://dreamgreen.shop/cart.html">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dreamgreen.shop/cart.html">
  <meta property="og:title" content="Your Gift Cart — Dream Green | Surat, Gujarat">
  <meta property="og:description" content="Review your curated plant gifts and proceed to secure checkout.">
  <meta property="og:image" content="https://dreamgreen.shop/assets/images/og-cart.png">
  <meta property="og:site_name" content="Dream Green">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://dreamgreen.shop/cart.html">
  <meta name="twitter:title" content="Your Gift Cart — Dream Green | Surat, Gujarat">
  <meta name="twitter:description" content="Review your curated plant gifts and proceed to secure checkout.">
  <meta name="twitter:image" content="https://dreamgreen.shop/assets/images/og-cart.png">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260329e">
</head>
<body>
  <div id="nav-slot"></div>

  <section class="cart-page section" style="padding-top:calc(var(--nav-height) + 2rem);">
    <div class="container">
      <div class="page-header__breadcrumb" style="margin-bottom:1.5rem;">
        <a href="index.html">Home</a> <span>/</span> <span>Cart</span>
      </div>
      <h1 class="page-header__title reveal">Your Gift Cart</h1>

      <div class="cart-page__layout" id="cartContent">
        <!-- Dynamically rendered -->
      </div>
    </div>
  </section>

  <div id="footer-slot"></div>

  <!-- Firebase SDKs (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <!-- Scripts -->
  <script src="js/firebase-config.js?v=20260328"></script>
  <script src="js/data.js?v=20260328"></script>
  <script src="js/cart.js?v=20260328"></script>
  <script src="js/config.js?v=20260328"></script>
  <script src="js/components.js?v=20260328"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // PRE-RENDER: If the cart is obviously empty in localStorage, show it immediately
      // without waiting for database sync.
      var initialItems = DreamGreenCart.getItems();
      if (initialItems.length === 0) {
        renderCart();
      } else {
        // Show a loading skeleton/spinner for non-empty carts until data is ready
        document.getElementById('cartContent').innerHTML = '<div class="loading-spinner" style="padding:4rem 0;">🪴 Checking your botanical gifts...</div>';
      }

      // Initialize Data from Firebase
      DreamGreenData.init(function() {
        DreamGreenComponents.initPage({
          onReady: function () {
            renderCart();
            DreamGreenCart.onChange(renderCart);
          }
        });
      });

      function renderCart() {
        var container = document.getElementById('cartContent');
        var items = DreamGreenCart.getCartDetails();

        if (items.length === 0) {
          container.innerHTML =
            '<div class="cart-empty reveal">' +
              '<div class="cart-empty__icon">🌱</div>' +
              '<h2>Your cart is empty</h2>' +
              '<p>Looks like you haven\'t added any plant gifts yet. Let\'s fix that!</p>' +
              '<a href="shop.html" class="btn btn--primary">Browse Plant Gifts</a>' +
            '</div>';
          return;
        }

        var totalPrice = DreamGreenCart.getTotalPrice();
        var totalSavings = DreamGreenCart.getTotalSavings();
        var totalItems = DreamGreenCart.getTotalItems();
        var deliveryFee = totalPrice >= 499 ? 0 : 49;
        var hasOutOfStock = items.some(function (i) { return i.product.inStock === false; });

        var checkoutBtnHTML = hasOutOfStock
          ? '<button class="btn btn--primary cart-summary__checkout-btn" disabled style="background:#999;cursor:not-allowed;opacity:0.7;">Remove out-of-stock items to continue</button>'
          : '<a href="checkout.html" class="btn btn--primary cart-summary__checkout-btn">Proceed to Checkout</a>';

        container.innerHTML =
          '<div class="cart-items reveal">' +
            '<div class="cart-items__header">' +
              '<span>' + totalItems + ' item' + (totalItems !== 1 ? 's' : '') + ' in your cart</span>' +
              '<button class="cart-clear-btn" id="clearCartBtn">Clear All</button>' +
            '</div>' +
            (hasOutOfStock ? '<div style="background:#fdecea;color:#c0392b;border:1px solid #c0392b;border-radius:8px;padding:0.8rem 1rem;margin-bottom:1rem;font-weight:500;">⚠️ Some items in your cart are currently out of stock. Please remove them to continue checkout.</div>' : '') +
            items.map(function (item) {
              var itemOOS = item.product.inStock === false;
              var qtyControl = itemOOS
                ? '<div class="qty-selector" style="opacity:0.5;"><span class="qty-display" style="padding:0 0.75rem;color:#c0392b;font-weight:600;">Unavailable</span></div>'
                : '<div class="qty-selector">' +
                    '<button class="qty-btn" data-qty-action="minus" data-product-id="' + item.id + '">−</button>' +
                    '<span class="qty-display">' + item.qty + '</span>' +
                    '<button class="qty-btn" data-qty-action="plus" data-product-id="' + item.id + '">+</button>' +
                  '</div>';
              return '<div class="cart-item" data-cart-item="' + item.id + '"' + (itemOOS ? ' style="background:#fff8f7;border:1px solid #f5c6cb;"' : '') + '>' +
                '<a href="product.html?id=' + item.id + '" class="cart-item__image">' +
                  '<img src="' + item.product.image + '" alt="' + item.product.name + '" width="100" height="100"' + (itemOOS ? ' style="filter:grayscale(0.6);"' : '') + '>' +
                '</a>' +
                '<div class="cart-item__details">' +
                  '<a href="product.html?id=' + item.id + '" class="cart-item__name">' + item.product.name + '</a>' +
                  '<div class="cart-item__meta">' + item.product.size + ' · ' + item.product.potType + '</div>' +
                  '<div class="cart-item__price">' + DreamGreenComponents.formatPrice(item.product.price) + '</div>' +
                  (itemOOS ? '<div style="color:#c0392b;font-size:0.8rem;font-weight:600;margin-top:0.35rem;">🚫 Out of stock — please remove</div>' : '') +
                '</div>' +
                '<div class="cart-item__controls">' +
                  qtyControl +
                  '<div class="cart-item__subtotal"' + (itemOOS ? ' style="text-decoration:line-through;color:#999;"' : '') + '>' + DreamGreenComponents.formatPrice(item.subtotal) + '</div>' +
                  '<button class="cart-item__remove" data-remove-item="' + item.id + '" title="Remove">✕</button>' +
                '</div>' +
              '</div>';
            }).join('') +
          '</div>' +
          '<div class="cart-summary reveal-right">' +
            '<h3 class="cart-summary__title">Order Summary</h3>' +
            '<div class="cart-summary__row"><span>Subtotal</span><span>' + DreamGreenComponents.formatPrice(totalPrice) + '</span></div>' +
            (totalSavings > 0 ? '<div class="cart-summary__row cart-summary__savings"><span>You Save</span><span>−' + DreamGreenComponents.formatPrice(totalSavings) + '</span></div>' : '') +
            '<div class="cart-summary__row"><span>Gift Wrapping</span><span class="cart-summary__free">Free</span></div>' +
            '<div class="cart-summary__row"><span>Delivery (Surat)</span><span>' + (deliveryFee === 0 ? '<span class="cart-summary__free">Free</span>' : DreamGreenComponents.formatPrice(deliveryFee)) + '</span></div>' +
            (deliveryFee > 0 ? '<div class="cart-summary__hint">Add ' + DreamGreenComponents.formatPrice(499 - totalPrice) + ' more for free delivery</div>' : '') +
            '<div class="cart-summary__divider"></div>' +
            '<div class="cart-summary__row cart-summary__total"><span>Total</span><span>' + DreamGreenComponents.formatPrice(totalPrice + deliveryFee) + '</span></div>' +
            checkoutBtnHTML +
            '<a href="shop.html" class="cart-summary__continue">← Continue Shopping</a>' +
            '<div class="cart-summary__badges">' +
              '<div>🔒 Secure Checkout</div>' +
              '<div>🚚 Same-day Delivery in Surat</div>' +
              '<div>💚 Live Plant Guarantee</div>' +
            '</div>' +
          '</div>';

        DreamGreenComponents.initScrollReveals();
      }

      // Event delegation for cart actions — attached ONCE outside renderCart
      document.getElementById('cartContent').addEventListener('click', function (e) {
        var minusBtn = e.target.closest('[data-qty-action="minus"]');
        var plusBtn = e.target.closest('[data-qty-action="plus"]');
        var removeBtn = e.target.closest('[data-remove-item]');
        var clearBtn = e.target.id === 'clearCartBtn';

        if (minusBtn) {
          var idSource = minusBtn.getAttribute('data-product-id');
          var item = DreamGreenCart.getItems().find(function (i) { return i.id.toString() === idSource.toString(); });
          if (item && item.qty > 1) DreamGreenCart.updateQty(item.id, item.qty - 1);
          else if (item) DreamGreenCart.removeItem(item.id);
        }
        if (plusBtn) {
          var idSource = plusBtn.getAttribute('data-product-id');
          var item = DreamGreenCart.getItems().find(function (i) { return i.id.toString() === idSource.toString(); });
          if (item && item.qty < 10) DreamGreenCart.updateQty(item.id, item.qty + 1);
        }
        if (removeBtn) {
          var idSource = removeBtn.getAttribute('data-remove-item');
          DreamGreenCart.removeItem(idSource);
        }
        if (clearBtn) {
          DreamGreenCart.clear();
        }
      });
    });
  </script>
</body>
</html>
