<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Plant Gifts — Dream Green | Surat, Gujarat</title>
  <meta name="description" content="Send a beautiful living gift. Curated plants in designer pots, gift-wrapped and delivered across Surat. Perfect for birthdays, anniversaries, and more.">
  <link rel="canonical" href="https://dreamgreen.shop/shop" id="dgCanonical">
  <script>
    // Resolve slug from clean URL (/product/:slug) first, fall back to ?id=.
    (function () {
      var pathMatch = window.location.pathname.match(/^\/product\/([^\/\?#]+)/);
      var pathSlug = pathMatch ? decodeURIComponent(pathMatch[1]) : null;
      var querySlug = new URLSearchParams(window.location.search).get('id');
      var slug = pathSlug || querySlug;
      var canon = document.getElementById('dgCanonical');
      if (slug) {
        window.__dgProductSlug = slug;
        if (canon) canon.setAttribute('href', 'https://dreamgreen.shop/product?id=' + encodeURIComponent(slug));
      } else {
        var m = document.createElement('meta');
        m.name = 'robots';
        m.content = 'noindex, follow';
        document.head.appendChild(m);
      }
    })();
  </script>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="product">
  <meta property="og:url" content="https://dreamgreen.shop/shop">
  <meta property="og:title" content="Premium Plant Gifts — Dream Green | Surat, Gujarat">
  <meta property="og:description" content="Send a beautiful living gift. Curated plants in designer pots, gift-wrapped and delivered across Surat.">
  <meta property="og:image" content="https://dreamgreen.shop/assets/images/og-product.png">
  <meta property="og:site_name" content="Dream Green">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://dreamgreen.shop/shop">
  <meta name="twitter:title" content="Premium Plant Gifts — Dream Green | Surat, Gujarat">
  <meta name="twitter:description" content="Send a beautiful living gift. Curated plants in designer pots, gift-wrapped and delivered across Surat.">
  <meta name="twitter:image" content="https://dreamgreen.shop/assets/images/og-product.png">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260329h">
</head>
<body>
  <div id="nav-slot"></div>

  <section class="product-detail section" style="padding-top:calc(var(--nav-height) + 2rem);">
    <div class="container">
      <div class="page-header__breadcrumb" id="breadcrumb" style="margin-bottom:1.5rem;">
        <a href="/">Home</a> <span>/</span> <a href="/shop">Shop</a> <span>/</span> <span id="breadcrumbName">Product</span>
      </div>
      <div class="product-detail__layout" id="productContent">
        <!-- Dynamically rendered -->
      </div>
    </div>
  </section>

  <!-- Related Products -->
  <section class="bestsellers section" id="relatedSection" style="display:none;">
    <div class="container">
      <h2 class="section-title reveal">You Might Also Love</h2>
      <div class="bestsellers__track" id="relatedTrack" style="margin-top:2rem;"></div>
    </div>
  </section>

  <div id="footer-slot"></div>

  <!-- Firebase SDKs (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <!-- Scripts -->
  <script src="js/firebase-config.js?v=20260328"></script>
  <script src="js/data.js?v=20260328"></script>
  <script src="js/cart.js?v=20260328"></script>
  <script src="js/config.js?v=20260328"></script>
  <script src="js/components.js?v=20260328"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Initialize Data from Firebase first
      DreamGreenData.init(function() {
        DreamGreenComponents.initPage({
          onReady: function () {
            // Slug already resolved in head script; fall back to query/session if needed.
            var productIdSource = window.__dgProductSlug ||
              new URLSearchParams(window.location.search).get('id');
            if (!productIdSource) {
              try { productIdSource = sessionStorage.getItem('last_viewed_product_id'); } catch(e) {}
            }

            var product = DreamGreenData.getProduct(productIdSource);

            if (!product) {
              console.error('Product not found for ID:', productIdSource);
              document.getElementById('productContent').innerHTML =
                '<div class="shop__empty"><h2>Product not found</h2>' +
                '<p>Sorry, we couldn\'t find that product (ID: ' + (productIdSource || 'None') + ').</p>' +
                '<a href="/shop" class="btn btn--primary">Browse All Plants</a></div>';
              return;
            }

            document.title = product.name + ' — Dream Green | Surat, Gujarat';
            document.getElementById('breadcrumbName').textContent = product.name;

            // Inject Product + Breadcrumb JSON-LD for Google rich results
            try {
              var productUrl = 'https://dreamgreen.shop/product?id=' + encodeURIComponent(product.slug || product.id || product.firebaseId);
              var imageUrl = (product.image && product.image.indexOf('http') === 0)
                ? product.image
                : 'https://dreamgreen.shop/' + (product.image || 'assets/images/logo.png').replace(/^\//, '');
              var productLd = {
                "@context": "https://schema.org",
                "@type": "Product",
                "name": product.name,
                "image": [imageUrl],
                "description": product.description || 'Curated plant gift by Dream Green, delivered across Surat, Gujarat.',
                "brand": { "@type": "Brand", "name": "Dream Green" },
                "sku": String(product.id || product.slug || ''),
                "offers": {
                  "@type": "Offer",
                  "url": productUrl,
                  "priceCurrency": "INR",
                  "price": product.price,
                  "availability": product.inStock === false
                    ? "https://schema.org/OutOfStock"
                    : "https://schema.org/InStock",
                  "seller": { "@type": "Organization", "name": "Dream Green" }
                },
                "aggregateRating": product.reviews ? {
                  "@type": "AggregateRating",
                  "ratingValue": product.rating || 5,
                  "reviewCount": product.reviews
                } : undefined
              };
              var breadcrumbLd = {
                "@context": "https://schema.org",
                "@type": "BreadcrumbList",
                "itemListElement": [
                  { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://dreamgreen.shop/" },
                  { "@type": "ListItem", "position": 2, "name": "Shop", "item": "https://dreamgreen.shop/shop" },
                  { "@type": "ListItem", "position": 3, "name": product.name, "item": productUrl }
                ]
              };
              var s1 = document.createElement('script');
              s1.type = 'application/ld+json';
              s1.text = JSON.stringify(productLd);
              document.head.appendChild(s1);
              var s2 = document.createElement('script');
              s2.type = 'application/ld+json';
              s2.text = JSON.stringify(breadcrumbLd);
              document.head.appendChild(s2);

              // Rich meta description based on product
              var metaDesc = document.querySelector('meta[name="description"]');
              if (metaDesc) metaDesc.setAttribute('content',
                product.name + ' — ' + (product.description || '').slice(0, 140) +
                ' | Dream Green, Surat, Gujarat. Same-day delivery available.');
            } catch (e) { /* non-fatal */ }

            var savings = product.originalPrice ? product.originalPrice - product.price : 0;
            var outOfStock = product.inStock === false;

            var soldOutBanner = outOfStock
              ? '<div class="product-detail__sold-out" style="background:#fdecea;color:#c0392b;border:1px solid #c0392b;border-radius:8px;padding:0.9rem 1rem;margin:1rem 0;font-weight:600;display:flex;align-items:center;gap:0.6rem;">🚫 This plant is currently <strong>out of stock</strong>. Please check back soon.</div>'
              : '';

            var qtyRowHTML = outOfStock
              ? '<div class="product-detail__qty-row">' +
                  '<button class="btn btn--primary product-detail__add-btn" id="addToCartBtn" disabled style="background:#999;cursor:not-allowed;opacity:0.7;">Out of Stock</button>' +
                '</div>'
              : '<div class="product-detail__qty-row">' +
                  '<div class="qty-selector">' +
                    '<button class="qty-btn" id="qtyMinus">−</button>' +
                    '<input type="number" class="qty-input" id="qtyInput" value="1" min="1" max="10">' +
                    '<button class="qty-btn" id="qtyPlus">+</button>' +
                  '</div>' +
                  '<button class="btn btn--primary product-detail__add-btn" id="addToCartBtn">🌿 Add to Gift — ' + DreamGreenComponents.formatPrice(product.price) + '</button>' +
                '</div>';

            document.getElementById('productContent').innerHTML =
              '<div class="product-detail__image reveal-left">' +
                '<div class="product-detail__image-main"' + (outOfStock ? ' style="filter:grayscale(0.5);"' : '') + '>' +
                  '<img src="' + product.image + '" alt="' + product.name + '" width="500" height="500">' +
                  (product.tag && !outOfStock ? '<div class="product-detail__badge">' + product.tag + '</div>' : '') +
                  (outOfStock ? '<div class="product-detail__badge" style="background:#c0392b;">Out of Stock</div>' : '') +
                '</div>' +
              '</div>' +
              '<div class="product-detail__info reveal-right">' +
                '<h1 class="product-detail__name">' + product.name + '</h1>' +
                '<div class="product-detail__rating">' +
                  DreamGreenComponents.renderStars(product.rating) +
                  ' <span>(' + product.reviews + ' reviews)</span>' +
                '</div>' +
                '<div class="product-detail__price-row">' +
                  '<span class="product-detail__price">' + DreamGreenComponents.formatPrice(product.price) + '</span>' +
                  (product.originalPrice ? '<span class="product-detail__original-price">' + DreamGreenComponents.formatPrice(product.originalPrice) + '</span>' : '') +
                  (savings > 0 && !outOfStock ? '<span class="product-detail__savings">Save ' + DreamGreenComponents.formatPrice(savings) + '</span>' : '') +
                '</div>' +
                soldOutBanner +
                '<p class="product-detail__desc">' + product.description + '</p>' +
                '<div class="product-detail__meta">' +
                  '<div class="product-detail__meta-item"><strong>Size:</strong> ' + product.size + '</div>' +
                  '<div class="product-detail__meta-item"><strong>Pot:</strong> ' + product.potType + '</div>' +
                  '<div class="product-detail__meta-item"><strong>Delivery:</strong> Same-day in Surat, Gujarat</div>' +
                '</div>' +
                qtyRowHTML +
                '<div class="product-detail__trust">' +
                  '<div>🎁 Gift-wrapped in our signature box</div>' +
                  '<div>🚚 Same-day delivery in Surat</div>' +
                  '<div>💚 100% live plant guarantee</div>' +
                  '<div>💌 Free personalized message card</div>' +
                '</div>' +
                '<div class="product-detail__care">' +
                  '<h3>Plant Care</h3>' +
                  '<div class="product-detail__care-item"><strong>☀️ Light:</strong> ' + product.careInfo.light + '</div>' +
                  '<div class="product-detail__care-item"><strong>💧 Water:</strong> ' + product.careInfo.water + '</div>' +
                  '<div class="product-detail__care-item"><strong>🌡️ Difficulty:</strong> ' + product.careInfo.difficulty + '</div>' +
                '</div>' +
                '<div class="product-detail__features">' +
                  '<h3>What\'s Included</h3>' +
                  '<ul>' + product.features.map(function (f) { return '<li>✓ ' + f + '</li>'; }).join('') + '</ul>' +
                '</div>' +
              '</div>';

            DreamGreenComponents.initScrollReveals();

            if (!outOfStock) {
              // Qty controls
              var qtyInput = document.getElementById('qtyInput');
              document.getElementById('qtyMinus').addEventListener('click', function () {
                var val = parseInt(qtyInput.value);
                if (val > 1) qtyInput.value = val - 1;
                updateBtnPrice();
              });
              document.getElementById('qtyPlus').addEventListener('click', function () {
                var val = parseInt(qtyInput.value);
                if (val < 10) qtyInput.value = val + 1;
                updateBtnPrice();
              });
              qtyInput.addEventListener('change', function () {
                var val = parseInt(this.value);
                if (isNaN(val) || val < 1) this.value = 1;
                if (val > 10) this.value = 10;
                updateBtnPrice();
              });

              function updateBtnPrice() {
                var btn = document.getElementById('addToCartBtn');
                var total = product.price * parseInt(qtyInput.value);
                btn.textContent = '🌿 Add to Gift — ' + DreamGreenComponents.formatPrice(total);
              }

              // Add to cart
              document.getElementById('addToCartBtn').addEventListener('click', function () {
                // Re-check stock at click time in case data refreshed
                var fresh = DreamGreenData.getProduct(product.id);
                if (fresh && fresh.inStock === false) {
                  alert('Sorry, this plant just went out of stock.');
                  window.location.reload();
                  return;
                }
                var qty = parseInt(qtyInput.value);
                DreamGreenCart.addItem(product.id, qty);
                this.textContent = '✓ Added to Cart!';
                this.style.backgroundColor = '#6e8e69';
                var self = this;
                setTimeout(function () {
                  self.style.backgroundColor = '';
                  updateBtnPrice();
                }, 2000);
              });
            }

            // Related products
            var related = DreamGreenData.products.filter(function (p) { return p.id !== product.id; }).slice(0, 4);
            if (related.length > 0) {
              document.getElementById('relatedSection').style.display = '';
              document.getElementById('relatedTrack').innerHTML = related.map(function (p) {
                return DreamGreenComponents.renderProductCard(p);
              }).join('');
            }
          }
        });
      });
    });
  </script>
</body>
</html>
